<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ — ADIA Cake Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>

<div class="admin-layout">

    <!-- ======= SIDEBAR ======= -->
    <aside class="a-sidebar">
        <div class="a-sidebar-logo">
            <div class="a-sidebar-logo-icon">🍰</div>
            <div>
                <div class="a-sidebar-logo-text">ADIA Cake</div>
                <div class="a-sidebar-logo-sub">Admin</div>
            </div>
        </div>

        <nav class="a-sidebar-nav">
            <div class="a-nav-section">
                <div class="a-nav-label">Управление</div>
                <a href="index.html" class="a-nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                    </svg>
                    Главная
                </a>
                <a href="products.html" class="a-nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><path d="M8 7V5a2 2 0 0 0-4 0v2"/>
                    </svg>
                    Товары
                </a>
                <a href="branch-products.html" class="a-nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
                    </svg>
                    Витрина по филиалам
                </a>
                <a href="orders.html" class="a-nav-link active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                    Заказы
                </a>
            </div>

            <div class="a-nav-section">
                <div class="a-nav-label">Сайт</div>
                <a href="../index.html" class="a-nav-link" target="_blank">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    Открыть витрину
                </a>
                <a href="../catalog.html" class="a-nav-link" target="_blank">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    Каталог
                </a>
            </div>
        </nav>

        <div class="a-sidebar-footer">
            <button class="a-logout-btn" id="logoutBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Выйти
            </button>
        </div>
    </aside>

    <!-- ======= MAIN ======= -->
    <div class="a-main">

        <div class="a-topbar">
            <div class="a-topbar-title" id="pageTitle">Заказ #…</div>
            <div class="a-topbar-user">
                <span>Привет, <strong id="adminUser">admin</strong></span>
                <div class="a-topbar-avatar">A</div>
            </div>
        </div>

        <div class="a-content">

            <!-- Back link -->
            <div style="margin-bottom:20px">
                <a href="orders.html" class="a-btn a-btn-outline a-btn-sm" style="display:inline-flex;align-items:center;gap:6px">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    Назад к заказам
                </a>
            </div>

            <!-- Content rendered by JS -->
            <div id="orderContent">
                <!-- loading state -->
                <div style="text-align:center;color:var(--a-text-light);padding:60px 0">Загрузка…</div>
            </div>

        </div>
    </div>
</div>

<!-- ======= TOASTS ======= -->
<div class="a-toast-container" id="toastContainer"></div>

<script type="module" src="../js/admin/order-details.js"></script>

</body>
</html>
